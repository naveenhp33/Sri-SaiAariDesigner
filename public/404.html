<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Sri & Sai Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-container {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-bottom: 0;
            line-height: 1;
        }
        .error-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #666;
        }
        .error-actions {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container navbar">
            <a href="/" class="logo">
                 <img src="./images/sri-logo2.png" alt="Sri & Sai Fashion"  class="logo-img">
                Sri & Sai Fashion
            </a>
        </div>
    </header>

    <div class="container error-container">
        <h1 class="error-code">404</h1>
        <p class="error-msg">Oops! The page you're looking for was moved or doesn't exist.</p>
        <div class="error-actions">
            <a href="/" class="btn">Return Home</a>
            <a href="products.html" class="btn btn-outline">Shop Designs</a>
        </div>
    </div>

    <footer class="footer-extended">
        <div class="footer-bottom">
            <p>&copy; 2026 Sri & Sai Fashion. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
